# =============================================
#  Palmiye Home — Netlify Configuration
#  Production-ready settings
# =============================================

[build]
  publish = "."
  # No build command needed for static site

# ── Security Headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://identity.netlify.com https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.netlify.com https://*.netlify.app; frame-src 'self' https://www.google.com https://maps.google.com"

# ── Cache Control ──
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/Pictures/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/Resimler/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ── API Functions ──
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# ── Domain Redirects ──
# Redirect www to non-www
[[redirects]]
  from = "https://www.palmiyehome.com/*"
  to = "https://palmiyehome.com/:splat"
  status = 301
  force = true

# Redirect old domain to new
[[redirects]]
  from = "https://kemerpalmiyehome.com/*"
  to = "https://palmiyehome.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.kemerpalmiyehome.com/*"
  to = "https://palmiyehome.com/:splat"
  status = 301
  force = true

# ── 404 Page ──
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
