# =============================================
#  Palmiye Home — Netlify Configuration
#  Production-ready settings
# =============================================

[build]
  publish = "."
  functions = "netlify/functions"

# ── Security Headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://identity.netlify.com https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.netlify.com https://*.netlify.app; frame-src 'self' https://www.google.com https://maps.google.com"

# ── Cache Control ──
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/Pictures/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/Resimler/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ── Admin Headers ──
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"

# ── API Redirects (EXISTING - preserved) ──
[[redirects]]
  from = "/api/bookings"
  to = "/.netlify/functions/get-bookings"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/save"
  to = "/.netlify/functions/save-bookings"
  status = 200
  force = true

# ── Admin Redirects (EXISTING - preserved) ──
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

# ── Domain Redirects ──
# palmiyehome.com → palmiyehomekemer.com (eski domain)
[[redirects]]
  from = "https://palmiyehome.com/*"
  to = "https://palmiyehomekemer.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.palmiyehome.com/*"
  to = "https://palmiyehomekemer.com/:splat"
  status = 301
  force = true

# kemerpalmiyehome.com → palmiyehomekemer.com
[[redirects]]
  from = "https://kemerpalmiyehome.com/*"
  to = "https://palmiyehomekemer.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.kemerpalmiyehome.com/*"
  to = "https://palmiyehomekemer.com/:splat"
  status = 301
  force = true

# www → non-www canonical
[[redirects]]
  from = "https://www.palmiyehomekemer.com/*"
  to = "https://palmiyehomekemer.com/:splat"
  status = 301
  force = true

# ── Catch-all (EXISTING - preserved, MUST be last) ──
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200