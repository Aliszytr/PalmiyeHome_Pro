<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Palmiye Home — Admin</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../Logo/favicon-32.png">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Lato',sans-serif;background:#0f2027;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}
    h1{color:#e2b965;font-size:1.4rem;margin-bottom:1.5rem}
    #login-section,#admin-section{max-width:700px;width:100%;text-align:center}
    #admin-section{display:none;text-align:left}
    .btn{padding:.6rem 1.5rem;border:none;border-radius:50px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
    .btn-gold{background:#c9943e;color:#fff}.btn-gold:hover{background:#e2b965}
    .btn-red{background:#dc3545;color:#fff;font-size:.8rem;padding:.4rem 1rem}.btn-red:hover{background:#c82333}
    .btn-teal{background:#1a8a7d;color:#fff}.btn-teal:hover{background:#2ec4b6}
    .bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:1rem;flex-wrap:wrap}
    .user-info{color:#8e949c;font-size:.85rem}
    .user-info strong{color:#fff}
    textarea{width:100%;min-height:400px;background:#1a3a4a;color:#e0e0e0;border:1px solid #2a4a5a;border-radius:12px;padding:1rem;font-family:'Courier New',monospace;font-size:.85rem;resize:vertical;line-height:1.5}
    textarea:focus{outline:none;border-color:#c9943e}
    .status{margin-top:.75rem;font-size:.85rem;min-height:1.5rem}
    .status.ok{color:#2ec4b6}
    .status.err{color:#dc3545}
    .help{margin-top:1.5rem;background:#1a3a4a;border-radius:12px;padding:1.25rem;font-size:.82rem;color:#8e949c;line-height:1.7}
    .help code{background:#0f2027;padding:2px 6px;border-radius:4px;color:#e2b965}
  </style>
</head>
<body>

<h1>🌴 Palmiye Home — Admin Panel</h1>

<!-- LOGIN -->
<div id="login-section">
  <p style="color:#8e949c;margin-bottom:1rem;">Takvim yönetimi için giriş yapın.</p>
  <button class="btn btn-gold" id="btn-login">🔐 Giriş Yap</button>
</div>

<!-- ADMIN -->
<div id="admin-section">
  <div class="bar">
    <span class="user-info">Merhaba, <strong id="user-email"></strong></span>
    <div style="display:flex;gap:.5rem">
      <button class="btn btn-teal" id="btn-load">📥 Yükle</button>
      <button class="btn btn-gold" id="btn-save">💾 Kaydet</button>
      <button class="btn btn-red" id="btn-logout">Çıkış</button>
    </div>
  </div>

  <textarea id="editor" spellcheck="false" placeholder="Veriler yükleniyor..."></textarea>
  <div class="status" id="status"></div>

  <div class="help">
    <strong>Format:</strong> Her satır bir rezervasyon. <code>from</code> ve <code>to</code> zorunlu, <code>note</code> opsiyonel.<br><br>
    <strong>Örnek:</strong><br>
    <code>{ "bookedRanges": [</code><br>
    <code>&nbsp;&nbsp;{ "from": "2026-06-01", "to": "2026-06-06", "note": "Alman aile" },</code><br>
    <code>&nbsp;&nbsp;{ "from": "2026-07-24", "to": "2026-07-30" }</code><br>
    <code>] }</code>
  </div>
</div>

<script>
const loginEl = document.getElementById('login-section');
const adminEl = document.getElementById('admin-section');
const editor  = document.getElementById('editor');
const status  = document.getElementById('status');
const emailEl = document.getElementById('user-email');

let currentUser = null;

// ── AUTH ──
netlifyIdentity.on('init', u => { if (u) login(u); });
netlifyIdentity.on('login', u => { login(u); netlifyIdentity.close(); });
netlifyIdentity.on('logout', () => { currentUser = null; loginEl.style.display = ''; adminEl.style.display = 'none'; });

document.getElementById('btn-login').addEventListener('click', () => netlifyIdentity.open('login'));
document.getElementById('btn-logout').addEventListener('click', () => {
  if (confirm('Çıkış yapmak istediğinize emin misiniz?')) netlifyIdentity.logout();
});

function login(user) {
  currentUser = user;
  loginEl.style.display = 'none';
  adminEl.style.display = 'block';
  emailEl.textContent = user.email;
  loadData();
}

// ── LOAD ──
document.getElementById('btn-load').addEventListener('click', loadData);

async function loadData() {
  setStatus('Yükleniyor...', '');
  try {
    const res = await fetch('/api/bookings');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    editor.value = JSON.stringify(data, null, 2);
    setStatus('✓ Veri yüklendi', 'ok');
  } catch (e) {
    setStatus('Yükleme hatası: ' + e.message, 'err');
  }
}

// ── GET JWT TOKEN (with fallback) ──
async function getToken() {
  // 1) Try refresh
  try { return await currentUser.jwt(true); } catch (_) {}
  // 2) Try cached
  try { return await currentUser.jwt(false); } catch (_) {}
  // 3) Try raw token from user object
  if (currentUser.token && currentUser.token.access_token) {
    return currentUser.token.access_token;
  }
  return null;
}

// ── SAVE ──
document.getElementById('btn-save').addEventListener('click', saveData);

async function saveData() {
  if (!currentUser) return;

  // Validate JSON
  let parsed;
  try {
    parsed = JSON.parse(editor.value);
  } catch (e) {
    setStatus('JSON formatı hatalı: ' + e.message, 'err');
    return;
  }

  if (!parsed.bookedRanges || !Array.isArray(parsed.bookedRanges)) {
    setStatus('bookedRanges dizisi bulunamadı', 'err');
    return;
  }

  setStatus('Kaydediliyor...', '');

  try {
    const token = await getToken();
    if (!token) {
      setStatus('Oturum süresi dolmuş — lütfen çıkış yapıp tekrar giriş yapın.', 'err');
      return;
    }

    const res = await fetch('/api/admin/save', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(parsed),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'HTTP ' + res.status);
    }

    const result = await res.json();
    setStatus('✓ Kaydedildi — ' + result.saved + ' rezervasyon', 'ok');
  } catch (e) {
    setStatus('Kaydetme hatası: ' + e.message, 'err');
  }
}

function setStatus(msg, cls) {
  status.textContent = msg;
  status.className = 'status' + (cls ? ' ' + cls : '');
}
</script>

</body>
</html>
